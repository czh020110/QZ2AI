# Nginx 唯一对外入口：/ 提供 Quartz 静态产物，/api 反代 FastAPI。
# 服务名 web/api 走 Compose 内部网络；仅本容器对外暴露端口。

# /api/chat 限流区：公开无鉴权且触发外部付费 LLM，必须限流防刷量。
# 10r/m ≈ 每 6 秒一次，burst 容许短时排队，nodelay 立即处理不拖延。
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Quartz 构建产物（web 服务构建后写入共享卷，nginx 只读托管）
    root /usr/share/nginx/html;
    index index.html;

    # 静态站：根路径优先回退到 tags 首页（当前内容集未生成顶层 index.html）
    location = / {
        try_files /index.html /tags/index.html =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 重建索引接口：安全由 X-Reindex-Token 保护（API 层鉴权），不做 IP 限制
    location = /api/reindex {
        proxy_pass http://api:8000;
        include /etc/nginx/proxy_common.conf;
    }

    # 问答接口：限流 + SSE 流式（关闭缓冲，逐 token 实时下发）
    location = /api/chat {
        limit_req zone=chat_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8000;
        include /etc/nginx/proxy_common.conf;

        # SSE：必须关闭缓冲与代理缓存，否则流式会被攒成一坨
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # 其余 API（含 /api/health）：普通反代
    location /api/ {
        proxy_pass http://api:8000;
        include /etc/nginx/proxy_common.conf;
    }

    # 管理后台 API：反代 FastAPI（安全由 X-Admin-Token 保护，不做 IP 限制）
    location /admin/api/ {
        proxy_pass http://api:8000;
        include /etc/nginx/proxy_common.conf;
    }

    # 管理后台前端：静态文件
    location /admin/ {
        alias /usr/share/nginx/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
}
