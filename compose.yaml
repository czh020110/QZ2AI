# 单机双服务编排：blog 常驻（API + nginx + syncer），web 按需运行。
# chroma 嵌入式（在 api 进程内），不单独起容器。

services:
  # 主服务：supervisord 管理 nginx + uvicorn，syncer 为后台线程。
  # 对外仅此容器暴露端口；内部 nginx 反代 uvicorn。
  blog:
    build: ./apps/api
    image: blog:latest
    env_file: .env
    ports:
      - "18088:80"
    volumes:
      - ./data:/data
      - ./.env:/app/.env  # 挂载 .env 使配置保存重启后不丢失
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
      - public:/usr/share/nginx/html:ro
      - ./apps/admin:/usr/share/nginx/admin:ro
      # 本地字体包(LXGW WenKai Screen 等):nginx 直接托管,避免依赖 CDN
      - ./apps/web/fonts:/usr/share/nginx/fonts:ro
    environment:
      - PROJECT_DIR=/project
      - https_proxy=${https_proxy:-}
      - http_proxy=${http_proxy:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Quartz 构建：读 data/notes，构建静态站到 public 卷后退出（构建工具，非常驻）。
  web:
    build: ./apps/web
    image: blog-web:latest
    env_file: .env
    environment:
      # 仅构建 notes_github_prefix 子目录，避免把仓库中私密目录发布到公网
      - NOTES_GITHUB_PREFIX=${NOTES_GITHUB_PREFIX:-}
    volumes:
      # notes 源用宿主机绝对路径 bind：syncer 在容器内通过 socket 调 compose run web 时，
      # 相对路径 ./data/notes 会被宿主机 daemon 解析成容器内路径（不存在），导致 web 容器
      # bind 到空目录、构建 0 篇。HOST_NOTES_DIR 由 blog 容器探测宿主机路径后注入；
      # 宿主机端直接 docker compose up 时未注入该变量，回退 ./data（宿主机项目根下真实存在）。
      - ${HOST_NOTES_DIR:-./data}/notes:/data/notes:ro
      # 挂载整个 data 目录只读,供 entrypoint 读取 appearance.json 的 blog_locale,
      # 运行时 sed 覆盖 quartz.config.yaml 的 locale(语言切换免重建镜像)。
      - ${HOST_NOTES_DIR:-./data}:/data_store:ro
      - public:/public
    restart: "no"

volumes:
  # Quartz 构建产物：web 写入、blog 容器内 nginx 只读托管
  public:
