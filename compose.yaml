# 单机多服务编排：对外仅 nginx 暴露端口，web/api 走内部网络。
# chroma 嵌入式（在 api 进程内），不单独起容器。

services:
  # FastAPI 后端：RAG 问答 + 索引重建。嵌入式 Chroma 单写入者，固定单进程。
  api:
    build: ./apps/api
    image: blog-api:latest
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Quartz 构建：读 data/notes，构建静态站到 public 卷后退出（构建工具，非常驻）。
  web:
    build: ./apps/web
    image: blog-web:latest
    volumes:
      - ./data/notes:/data/notes:ro
      - public:/public
    restart: "no"

  # 唯一对外入口：/ 托管 public 卷静态产物，/api 反代 api 服务。
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_common.conf:/etc/nginx/proxy_common.conf:ro
      - public:/usr/share/nginx/html:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  # Quartz 构建产物：web 写入、nginx 只读托管
  public:
