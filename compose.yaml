# 单机双服务编排：blog 常驻（API + nginx + syncer），web 按需运行。
# chroma 嵌入式（在 api 进程内），不单独起容器。

services:
  # 主服务：supervisord 管理 nginx + uvicorn，syncer 为后台线程。
  # 对外仅此容器暴露端口；内部 nginx 反代 uvicorn。
  blog:
    build: ./apps/api
    image: blog:latest
    env_file: .env
    ports:
      - "18088:80"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
      - public:/usr/share/nginx/html:ro
      - ./apps/admin:/usr/share/nginx/admin:ro
    environment:
      - PROJECT_DIR=/project
    restart: unless-stopped
    depends_on:
      web:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Quartz 构建：读 data/notes，构建静态站到 public 卷后退出（构建工具，非常驻）。
  web:
    build: ./apps/web
    image: blog-web:latest
    env_file: .env
    volumes:
      - ./data/notes:/data/notes:ro
      - public:/public
    restart: "no"

volumes:
  # Quartz 构建产物：web 写入、blog 容器内 nginx 只读托管
  public:
