<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理后台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0f1117;
  --bg-panel: #161822;
  --bg-card: #1c1f2e;
  --bg-input: #232637;
  --border: #2a2d3e;
  --border-focus: #5b6abf;
  --text-primary: #e4e6f0;
  --text-secondary: #8b8fa3;
  --text-muted: #5c6078;
  --accent: #6c7ee1;
  --accent-hover: #8494f0;
  --error: #e85d6f;
  --error-bg: rgba(232,93,111,.12);
  --suggestion: #5b9cf5;
  --suggestion-bg: rgba(91,156,245,.12);
  --other: #8b8fa3;
  --other-bg: rgba(139,143,163,.12);
  --resolved: #4ecb8d;
  --resolved-bg: rgba(78,203,141,.12);
  --dismissed: #f0a854;
  --dismissed-bg: rgba(240,168,84,.12);
  --pending: #6c7ee1;
  --pending-bg: rgba(108,126,225,.12);
  --radius: 8px;
  --radius-sm: 5px;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
  --transition: .2s cubic-bezier(.4,0,.2,1);
}

html { font-size: 15px; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: -1px;
  width: 1px; height: 100%;
  background: linear-gradient(to bottom, var(--accent) 0%, transparent 40%, transparent 60%, var(--accent) 100%);
  opacity: .3;
}

.sidebar-brand {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text-primary);
}

.sidebar-brand p {
  font-size: .72rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.sidebar-nav {
  padding: 16px 12px;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
  font-size: .88rem;
  font-weight: 400;
  border: 1px solid transparent;
  user-select: none;
}

.nav-item:hover {
  background: var(--bg-card);
  color: var(--text-primary);
}

.nav-item.active {
  background: rgba(108,126,225,.1);
  color: var(--accent);
  border-color: rgba(108,126,225,.2);
  font-weight: 500;
}

.nav-item svg {
  width: 18px; height: 18px;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

.token-status {
  font-size: .72rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.token-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--resolved);
  box-shadow: 0 0 6px var(--resolved);
}

.btn-token {
  margin-top: 8px;
  width: 100%;
  padding: 7px;
  font-size: .75rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-token:hover {
  border-color: var(--border-focus);
  color: var(--text-primary);
}

/* ===== Main ===== */
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg-deep);
  position: relative;
}

.main::before {
  content: '';
  position: fixed;
  top: 0; left: 220px; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 70% 10%, rgba(108,126,225,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 90%, rgba(78,203,141,.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.page-header {
  padding: 32px 40px 0;
  position: relative;
  z-index: 1;
}

.page-header h2 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -.3px;
}

.page-header p {
  color: var(--text-muted);
  font-size: .82rem;
  margin-top: 4px;
}

.page-content {
  padding: 24px 40px 40px;
  position: relative;
  z-index: 1;
}

/* ===== Feedback ===== */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: .8rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }

.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(108,126,225,.3);
}

.feedback-list { display: flex; flex-direction: column; gap: 10px; }

.feedback-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: all var(--transition);
  animation: fadeUp .3s ease-out both;
}

.feedback-card:hover {
  border-color: rgba(108,126,225,.3);
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}

.feedback-top {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.feedback-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem;
  color: var(--text-muted);
  background: var(--bg-input);
  padding: 2px 8px;
  border-radius: 3px;
}

.tag {
  font-size: .7rem;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 500;
  letter-spacing: .3px;
}

.tag-error { color: var(--error); background: var(--error-bg); }
.tag-suggestion { color: var(--suggestion); background: var(--suggestion-bg); }
.tag-other { color: var(--other); background: var(--other-bg); }
.tag-pending { color: var(--pending); background: var(--pending-bg); }
.tag-resolved { color: var(--resolved); background: var(--resolved-bg); }
.tag-dismissed { color: var(--dismissed); background: var(--dismissed-bg); }

.feedback-title {
  font-weight: 500;
  font-size: .92rem;
  color: var(--text-primary);
  margin-right: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 300px;
}

.feedback-time {
  font-size: .72rem;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.feedback-body {
  color: var(--text-secondary);
  font-size: .85rem;
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.feedback-actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: .76rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.action-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.action-btn.btn-resolve:hover {
  border-color: var(--resolved);
  color: var(--resolved);
}

.action-btn.btn-dismiss:hover {
  border-color: var(--dismissed);
  color: var(--dismissed);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: .4; }
.empty-state p { font-size: .88rem; }

/* ===== Config ===== */
.config-section {
  margin-bottom: 28px;
}

.config-section-title {
  font-size: .78rem;
  font-weight: 500;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}

.config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.config-item {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.config-label {
  font-size: .78rem;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 6px;
}

.config-label .sensitive-badge {
  font-size: .6rem;
  background: var(--error-bg);
  color: var(--error);
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: .5px;
}

.config-input {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  transition: all var(--transition);
  outline: none;
}

.config-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 2px rgba(108,126,225,.15);
}

.config-input.sensitive {
  color: var(--text-muted);
}

.config-input.sensitive::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.config-footer {
  margin-top: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.btn-save {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: .88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.btn-save:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px rgba(108,126,225,.3);
  transform: translateY(-1px);
}

.btn-save:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.save-hint {
  font-size: .75rem;
  color: var(--text-muted);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: .84rem;
  z-index: 1000;
  transform: translateY(80px);
  opacity: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
  max-width: 400px;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast.success {
  background: var(--resolved-bg);
  border: 1px solid rgba(78,203,141,.3);
  color: var(--resolved);
}

.toast.error {
  background: var(--error-bg);
  border: 1px solid rgba(232,93,111,.3);
  color: var(--error);
}

.toast.info {
  background: var(--suggestion-bg);
  border: 1px solid rgba(91,156,245,.3);
  color: var(--suggestion);
}

/* ===== Loading ===== */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: 40px auto;
}

/* ===== Animations ===== */
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  body { flex-direction: column; overflow-y: auto; }
  .sidebar {
    width: 100%;
    min-height: auto;
    flex-direction: row;
    align-items: center;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .sidebar::after { display: none; }
  .sidebar-brand { padding: 12px 16px; border-bottom: none; }
  .sidebar-brand h1 { font-size: .95rem; }
  .sidebar-brand p { display: none; }
  .sidebar-nav { padding: 8px; display: flex; gap: 4px; }
  .sidebar-footer { display: none; }
  .main::before { left: 0; }
  .page-header { padding: 20px 16px 0; }
  .page-content { padding: 16px; }
  .config-grid { grid-template-columns: 1fr; }
  .feedback-title { max-width: 140px; }
}

/* ===== Login Overlay ===== */
.login-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-deep);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 360px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 32px;
  text-align: center;
}

.login-box h2 {
  margin-bottom: 8px;
  font-size: 1.2rem;
}

.login-box p {
  color: var(--text-muted);
  font-size: .82rem;
  margin-bottom: 24px;
}

.login-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: .88rem;
  outline: none;
  transition: all var(--transition);
  text-align: center;
  letter-spacing: 2px;
}

.login-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(108,126,225,.15);
}

.login-btn {
  margin-top: 16px;
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: .9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.login-btn:hover {
  background: var(--accent-hover);
}

.login-error {
  margin-top: 12px;
  font-size: .78rem;
  color: var(--error);
  min-height: 1.2em;
}

/* hidden */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>管理后台</h2>
    <p>请输入管理员 Token 以继续</p>
    <input type="password" class="login-input" id="loginInput" placeholder="Admin Token" autocomplete="off">
    <button class="login-btn" id="loginBtn">验证登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App Shell -->
<div class="sidebar">
  <div class="sidebar-brand">
    <h1>博客管理</h1>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-tab="feedback" onclick="switchTab('feedback')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      反馈管理
    </div>
    <div class="nav-item" data-tab="config" onclick="switchTab('config')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      环境配置
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="token-status">
      <span class="token-dot"></span>
      <span>Token 已认证</span>
    </div>
    <button class="btn-token" onclick="resetToken()">重置 Token</button>
  </div>
</div>

<div class="main">
  <!-- Feedback Tab -->
  <div id="tab-feedback">
    <div class="page-header">
      <h2>反馈管理</h2>
      <p>查看和处理用户提交的文档反馈</p>
    </div>
    <div class="page-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="" onclick="filterFeedback('', this)">全部</button>
        <button class="filter-btn" data-filter="pending" onclick="filterFeedback('pending', this)">待处理</button>
        <button class="filter-btn" data-filter="resolved" onclick="filterFeedback('resolved', this)">已处理</button>
        <button class="filter-btn" data-filter="dismissed" onclick="filterFeedback('dismissed', this)">已忽略</button>
      </div>
      <div class="feedback-list" id="feedbackList">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Config Tab -->
  <div id="tab-config" class="hidden">
    <div class="page-header">
      <h2>环境配置</h2>
      <p>查看和修改博客运行时配置</p>
    </div>
    <div class="page-content" id="configContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '/admin/api';
let adminToken = '';
let currentFilter = '';
let configData = [];

// ===== Auth =====
function getToken() {
  return sessionStorage.getItem('admin_token') || '';
}

function setToken(token) {
  adminToken = token;
  sessionStorage.setItem('admin_token', token);
}

function resetToken() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginInput').value = '';
}

async function verifyToken(token) {
  try {
    const res = await fetch(`${API_BASE}/feedback`, {
      headers: { 'X-Admin-Token': token }
    });
    return res.ok;
  } catch {
    return false;
  }
}

document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('loginInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const input = document.getElementById('loginInput');
  const error = document.getElementById('loginError');
  const token = input.value.trim();
  if (!token) { error.textContent = '请输入 Token'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '验证中...';

  const valid = await verifyToken(token);
  if (valid) {
    setToken(token);
    document.getElementById('loginOverlay').classList.add('hidden');
    loadFeedback();
  } else {
    error.textContent = 'Token 无效，请重试';
    btn.disabled = false;
    btn.textContent = '验证登录';
  }
}

// ===== Tabs =====
function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
  document.getElementById('tab-feedback').classList.toggle('hidden', tab !== 'feedback');
  document.getElementById('tab-config').classList.toggle('hidden', tab !== 'config');
  if (tab === 'feedback') loadFeedback();
  if (tab === 'config') loadConfig();
}

// ===== Feedback =====
async function loadFeedback() {
  const list = document.getElementById('feedbackList');
  list.innerHTML = '<div class="spinner"></div>';

  try {
    const params = currentFilter ? `?status_filter=${currentFilter}` : '';
    const res = await fetch(`${API_BASE}/feedback${params}`, {
      headers: { 'X-Admin-Token': adminToken }
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    renderFeedback(data);
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
  }
}

function renderFeedback(items) {
  const list = document.getElementById('feedbackList');
  if (!items.length) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>暂无反馈记录</p></div>`;
    return;
  }

  list.innerHTML = items.map((item, i) => `
    <div class="feedback-card" style="animation-delay:${i * 40}ms">
      <div class="feedback-top">
        <span class="feedback-id">#${item.id}</span>
        <span class="tag tag-${item.feedback_type}">${typeLabel(item.feedback_type)}</span>
        <span class="tag tag-${item.status}">${statusLabel(item.status)}</span>
        <span class="feedback-title" title="${esc(item.page_title)}">${esc(item.page_title) || '—'}</span>
        <span class="feedback-time">${formatTime(item.created_at)}</span>
      </div>
      <div class="feedback-body">${esc(item.content)}</div>
      <div class="feedback-actions">
        ${item.status === 'pending' ? `
          <button class="action-btn btn-resolve" onclick="updateFeedback(${item.id}, 'resolved')">标记已处理</button>
          <button class="action-btn btn-dismiss" onclick="updateFeedback(${item.id}, 'dismissed')">标记已忽略</button>
        ` : `
          <button class="action-btn" onclick="updateFeedback(${item.id}, 'pending')">恢复待处理</button>
        `}
      </div>
    </div>
  `).join('');
}

async function updateFeedback(id, newStatus) {
  try {
    const res = await fetch(`${API_BASE}/feedback/${id}`, {
      method: 'PATCH',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_status: newStatus })
    });
    if (!res.ok) throw new Error(`${res.status}`);
    showToast(statusLabel(newStatus) + '成功', 'success');
    loadFeedback();
  } catch (e) {
    showToast('操作失败：' + e.message, 'error');
  }
}

function filterFeedback(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFeedback();
}

function typeLabel(t) {
  return { error: '错误', suggestion: '建议', other: '其他' }[t] || t;
}

function statusLabel(s) {
  return { pending: '待处理', resolved: '已处理', dismissed: '已忽略' }[s] || s;
}

// ===== Config =====
async function loadConfig() {
  const content = document.getElementById('configContent');
  content.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`${API_BASE}/config`, {
      headers: { 'X-Admin-Token': adminToken }
    });
    if (!res.ok) throw new Error(`${res.status}`);
    configData = await res.json();
    renderConfig(configData);
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
  }
}

function groupConfig(items) {
  const groups = {};
  const groupMap = {
    llm_base_url: 'LLM 模型', llm_api_key: 'LLM 模型', llm_model: 'LLM 模型',
    embedding_provider: 'Embedding 向量', embedding_api_key: 'Embedding 向量',
    embedding_model: 'Embedding 向量', embedding_dimensions: 'Embedding 向量', embedding_text_type: 'Embedding 向量',
    rerank_provider: 'Reranker 重排序', rerank_api_key: 'Reranker 重排序',
    rerank_model: 'Reranker 重排序', rerank_top_n: 'Reranker 重排序',
    rerank_enabled: 'Reranker 重排序', rerank_instruct: 'Reranker 重排序',
    chroma_dir: '数据目录', notes_dir: '数据目录', docstore_path: '数据目录',
    db_path: '数据目录', chroma_collection: '数据目录',
    similarity_top_k: '检索参数', llm_mock: '检索参数',
    llm_timeout_seconds: '超时与重试', embedding_timeout_seconds: '超时与重试',
    rerank_timeout_seconds: '超时与重试', http_max_retries: '超时与重试',
    http_retry_backoff_seconds: '超时与重试', embedding_batch_size: '超时与重试',
    reindex_token: '安全 Token', admin_token: '安全 Token',
    allowed_origins: 'CORS', coscli_bin: 'COS 同步', cos_secret_id: 'COS 同步',
    cos_secret_key: 'COS 同步', cos_region: 'COS 同步', cos_endpoint: 'COS 同步',
    cos_bucket: 'COS 同步', cos_sync_source: 'COS 同步',
    coscli_config_path: 'COS 同步', api_base: 'COS 同步',
  };

  items.forEach(item => {
    const group = groupMap[item.key] || '其他';
    if (!groups[group]) groups[group] = [];
    groups[group].push(item);
  });
  return groups;
}

function renderConfig(items) {
  const content = document.getElementById('configContent');
  const groups = groupConfig(items);

  let html = '';
  for (const [name, fields] of Object.entries(groups)) {
    html += `<div class="config-section">
      <div class="config-section-title">${esc(name)}</div>
      <div class="config-grid">`;
    fields.forEach(f => {
      const isSensitive = f.sensitive;
      const inputType = f.type === 'bool' ? 'checkbox' : 'text';
      const value = f.type === 'bool' ? (f.value === true || f.value === 'True' || f.value === 'true') : f.value;
      if (inputType === 'checkbox') {
        html += `<div class="config-item">
          <label class="config-label">${esc(f.key)}${isSensitive ? '<span class="sensitive-badge">敏感</span>' : ''}</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px">
            <input type="checkbox" data-key="${esc(f.key)}" ${value ? 'checked' : ''} style="accent-color:var(--accent);width:16px;height:16px">
            <span style="font-size:.78rem;color:var(--text-secondary)">${value ? '已开启' : '已关闭'}</span>
          </label>
        </div>`;
      } else {
        html += `<div class="config-item">
          <label class="config-label">${esc(f.key)}${isSensitive ? '<span class="sensitive-badge">敏感</span>' : ''}</label>
          <input class="config-input${isSensitive ? ' sensitive' : ''}" type="text"
            data-key="${esc(f.key)}" data-sensitive="${isSensitive}"
            value="${esc(String(value))}"
            placeholder="${isSensitive ? '输入新值覆盖' : ''}"
            ${isSensitive ? 'onfocus="this.select()"' : ''}>
        </div>`;
      }
    });
    html += '</div></div>';
  }

  html += `<div class="config-footer">
    <button class="btn-save" onclick="saveConfig()">保存配置</button>
    <span class="save-hint">修改后需重启 API 服务生效</span>
  </div>`;

  content.innerHTML = html;
}

async function saveConfig() {
  const btn = document.querySelector('.btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const updates = {};
  document.querySelectorAll('.config-input').forEach(input => {
    const key = input.dataset.key;
    const isSensitive = input.dataset.sensitive === 'true';
    // 敏感字段未修改（值仍为 ****）则跳过
    if (isSensitive && input.value === '****') return;
    if (input.value !== input.defaultValue) {
      updates[key] = input.value;
    }
  });
  document.querySelectorAll('.config-item input[type="checkbox"]').forEach(cb => {
    updates[cb.dataset.key] = cb.checked ? 'true' : 'false';
  });

  if (!Object.keys(updates).length) {
    showToast('无变更需要保存', 'info');
    btn.disabled = false;
    btn.textContent = '保存配置';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/config`, {
      method: 'PUT',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const result = await res.json();
    showToast(result.message || '配置已更新，需重启 API 服务生效', 'success');
    loadConfig();
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '保存配置';
}

// ===== Utils =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } catch { return ts; }
}

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Init =====
(async function init() {
  adminToken = getToken();
  if (adminToken) {
    const valid = await verifyToken(adminToken);
    if (valid) {
      document.getElementById('loginOverlay').classList.add('hidden');
      loadFeedback();
      return;
    }
  }
  // Show login
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginInput').focus();
})();
</script>
