<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理后台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a0a0a;
    --bg-panel: #111111;
    --bg-card: #141414;
    --bg-input: #1a1a1a;
    --border: #262626;
    --border-focus: #404040;
    --text-primary: #f0f0f0;
    --text-secondary: #a3a3a3;
    --text-muted: #737373;
    --accent: #ffffff;
    --accent-hover: #e5e5e5;
    --error: #ef4444;
    --error-bg: rgba(239,68,68,.10);
    --suggestion: #a3a3a3;
    --suggestion-bg: rgba(163,163,163,.10);
    --other: #737373;
    --other-bg: rgba(115,115,115,.10);
    --resolved: #22c55e;
    --resolved-bg: rgba(34,197,94,.10);
    --dismissed: #f59e0b;
    --dismissed-bg: rgba(245,158,11,.10);
    --pending: #a3a3a3;
    --pending-bg: rgba(163,163,163,.10);
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 0 0 1px rgba(255,255,255,.04);
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }

  html { font-size: 15px; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-brand h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: .5px;
    color: var(--text-primary);
  }

  .sidebar-brand p {
    font-size: .72rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-secondary);
    font-size: .88rem;
    font-weight: 400;
    border: 1px solid transparent;
    user-select: none;
  }

  .nav-item:hover {
    background: rgba(255,255,255,.04);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: rgba(255,255,255,.06);
    color: var(--text-primary);
    border-color: rgba(255,255,255,.10);
    font-weight: 500;
  }

  .nav-item svg {
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .token-status {
    font-size: .72rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .token-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--resolved);
    box-shadow: 0 0 6px var(--resolved);
  }

  .btn-token {
    margin-top: 8px;
    width: 100%;
    padding: 7px;
    font-size: .75rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn-token:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  /* ===== Main ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-deep);
    position: relative;
  }

  .page-header {
    padding: 32px 40px 0;
    position: relative;
    z-index: 1;
  }

  .page-header h2 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -.3px;
  }

  .page-header p {
    color: var(--text-muted);
    font-size: .82rem;
    margin-top: 4px;
  }

  .page-content {
    padding: 24px 40px 40px;
    position: relative;
    z-index: 1;
  }

  /* ===== Feedback ===== */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: .8rem;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }

  .filter-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .filter-btn.active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--bg-deep);
    box-shadow: none;
  }

  .feedback-list { display: flex; flex-direction: column; gap: 10px; }

  .feedback-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: all var(--transition);
    animation: fadeUp .3s ease-out both;
  }

  .feedback-card:hover {
    border-color: rgba(255,255,255,.12);
    box-shadow: 0 0 0 1px rgba(255,255,255,.04);
  }

  .feedback-top {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .feedback-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: var(--text-muted);
    background: var(--bg-input);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .tag {
    font-size: .7rem;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: .3px;
  }

  .tag-error { color: var(--error); background: var(--error-bg); }
  .tag-suggestion { color: var(--suggestion); background: var(--suggestion-bg); }
  .tag-other { color: var(--other); background: var(--other-bg); }
  .tag-pending { color: var(--pending); background: var(--pending-bg); }
  .tag-resolved { color: var(--resolved); background: var(--resolved-bg); }
  .tag-dismissed { color: var(--dismissed); background: var(--dismissed-bg); }

  .feedback-title {
    font-weight: 500;
    font-size: .92rem;
    color: var(--text-primary);
    margin-right: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .feedback-time {
    font-size: .72rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .feedback-body {
    color: var(--text-secondary);
    font-size: .85rem;
    line-height: 1.6;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .feedback-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    padding: 5px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: .76rem;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }

  .action-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  .action-btn.btn-resolve:hover {
    border-color: var(--resolved);
    color: var(--resolved);
  }

  .action-btn.btn-dismiss:hover {
    border-color: var(--dismissed);
    color: var(--dismissed);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-state p { font-size: .88rem; }

  /* ===== Config ===== */
  .config-section {
    margin-bottom: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }

  .config-section-title {
    font-size: .78rem;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .config-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .config-label {
    font-size: .78rem;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .config-label .sensitive-badge {
    font-size: .6rem;
    background: var(--error-bg);
    color: var(--error);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: .5px;
  }

  .config-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    transition: all var(--transition);
    outline: none;
  }

  .config-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 2px rgba(255,255,255,.06);
  }

  .config-input.sensitive {
    color: var(--text-muted);
  }

  .config-input.sensitive::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .config-footer {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .btn-save {
    padding: 10px 28px;
    background: var(--text-primary);
    color: var(--bg-deep);
    border: 1px solid var(--text-primary);
    border-radius: var(--radius);
    font-size: .88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }

  .btn-save:hover {
    background: transparent;
    color: var(--text-primary);
    box-shadow: none;
    transform: translateY(-1px);
  }

  .btn-save:disabled {
    opacity: .4;
    cursor: not-allowed;
    transform: none;
  }

  .save-hint {
    font-size: .75rem;
    color: var(--text-muted);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: .84rem;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all .35s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    max-width: 400px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--resolved);
  }

  .toast.error {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--error);
  }

  .toast.info {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  /* ===== Loading ===== */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--text-primary);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: 40px auto;
  }

  /* ===== Animations ===== */
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; }
    .sidebar {
      width: 100%;
      min-height: auto;
      flex-direction: row;
      align-items: center;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .sidebar-brand { padding: 12px 16px; border-bottom: none; }
    .sidebar-brand h1 { font-size: .95rem; }
    .sidebar-brand p { display: none; }
    .sidebar-nav { padding: 8px; display: flex; gap: 4px; }
    .sidebar-footer { display: none; }
    .page-header { padding: 20px 16px 0; }
    .page-content { padding: 16px; }
    .config-grid { grid-template-columns: 1fr; }
    .feedback-title { max-width: 140px; }
  }

  /* ===== Login Overlay ===== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-deep);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    width: 360px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 32px;
    text-align: center;
  }

  .login-box h2 {
    margin-bottom: 8px;
    font-size: 1.2rem;
  }

  .login-box p {
    color: var(--text-muted);
    font-size: .82rem;
    margin-bottom: 24px;
  }

  .login-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: .88rem;
    outline: none;
    transition: all var(--transition);
    text-align: center;
    letter-spacing: 2px;
  }

  .login-input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(255,255,255,.06);
  }

  .login-btn {
    margin-top: 16px;
    width: 100%;
    padding: 11px;
    background: var(--text-primary);
    color: var(--bg-deep);
    border: 1px solid var(--text-primary);
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }

  .login-btn:hover {
    background: transparent;
    color: var(--text-primary);
  }

  .login-error {
    margin-top: 12px;
    font-size: .78rem;
    color: var(--error);
    min-height: 1.2em;
  }

  /* hidden */
  .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>管理后台</h2>
    <p>请输入管理员 Token 以继续</p>
    <input type="password" class="login-input" id="loginInput" placeholder="Admin Token" autocomplete="off">
    <button class="login-btn" id="loginBtn">验证登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App Shell -->
<div class="sidebar">
  <div class="sidebar-brand">
    <h1>博客管理</h1>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-tab="feedback" onclick="switchTab('feedback')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      反馈管理
    </div>
    <div class="nav-item" data-tab="model" onclick="switchTab('model')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      模型配置
    </div>
    <div class="nav-item" data-tab="sync-data" onclick="switchTab('sync-data')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      数据同步
    </div>
    <div class="nav-item" data-tab="sync" onclick="switchTab('sync')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 6.5m0 0l3 3-3 3m-3-6l-3 3 3 3"/></svg>
      自动同步
    </div>
    <div class="nav-item" data-tab="notify" onclick="switchTab('notify')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a1.94 1.94 0 0 1-3.46 0"/></svg>
      自动通知
    </div>
    <div class="nav-item" data-tab="security" onclick="switchTab('security')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      安全设置
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="token-status">
      <span class="token-dot"></span>
      <span>Token 已认证</span>
    </div>
    <button class="btn-token" onclick="resetToken()">重置 Token</button>
  </div>
</div>

<div class="main">
  <!-- Feedback Tab -->
  <div id="tab-feedback">
    <div class="page-header">
      <h2>反馈管理</h2>
      <p>查看和处理用户提交的文档反馈</p>
    </div>
    <div class="page-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="" onclick="filterFeedback('', this)">全部</button>
        <button class="filter-btn" data-filter="pending" onclick="filterFeedback('pending', this)">待处理</button>
        <button class="filter-btn" data-filter="resolved" onclick="filterFeedback('resolved', this)">已处理</button>
        <button class="filter-btn" data-filter="dismissed" onclick="filterFeedback('dismissed', this)">已忽略</button>
      </div>
      <div class="feedback-list" id="feedbackList">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Model Config Tab -->
  <div id="tab-model" class="hidden">
    <div class="page-header">
      <h2>模型配置</h2>
      <p>LLM、Embedding、Reranker 及超时设置</p>
    </div>
    <div class="page-content" id="modelContent">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Data Sync Tab -->
  <div id="tab-sync-data" class="hidden">
    <div class="page-header">
      <h2>数据同步</h2>
      <p>数据目录与远程同步源配置</p>
    </div>
    <div class="page-content" id="syncDataContent">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Notify Tab -->
  <div id="tab-notify" class="hidden">
    <div class="page-header">
      <h2>自动通知</h2>
      <p>邮件通知与告警配置</p>
    </div>
    <div class="page-content" id="notifyContent">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Security Tab -->
  <div id="tab-security" class="hidden">
    <div class="page-header">
      <h2>安全设置</h2>
      <p>Token 与 CORS 安全配置</p>
    </div>
    <div class="page-content" id="securityContent">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Sync Tab -->
  <div id="tab-sync" class="hidden">
    <div class="page-header">
      <h2>自动同步</h2>
      <p>远程笔记变动时自动触发同步与重建</p>
    </div>
    <div class="page-content" id="syncContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '/admin/api';
let adminToken = '';
let currentFilter = '';
let configData = [];

// ===== Auth =====
function getToken() {
  return sessionStorage.getItem('admin_token') || '';
}

function setToken(token) {
  adminToken = token;
  sessionStorage.setItem('admin_token', token);
}

function resetToken() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginInput').value = '';
}

async function verifyToken(token) {
  try {
    const res = await fetch(`${API_BASE}/feedback`, {
      headers: { 'X-Admin-Token': token }
    });
    return res.ok;
  } catch {
    return false;
  }
}

async function handleLogin() {
  const input = document.getElementById('loginInput');
  const error = document.getElementById('loginError');
  const token = input.value.trim();
  if (!token) { error.textContent = '请输入 Token'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '验证中...';

  const valid = await verifyToken(token);
  if (valid) {
    setToken(token);
    document.getElementById('loginOverlay').classList.add('hidden');
    loadFeedback();
  } else {
    error.textContent = 'Token 无效，请重试';
    btn.disabled = false;
    btn.textContent = '验证登录';
  }
}

// ===== Tabs =====
function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
  document.getElementById('tab-feedback').classList.toggle('hidden', tab !== 'feedback');
  document.getElementById('tab-model').classList.toggle('hidden', tab !== 'model');
  document.getElementById('tab-sync-data').classList.toggle('hidden', tab !== 'sync-data');

async function loadFeedback() {
  const list = document.getElementById('feedbackList');
  list.innerHTML = '<div class="spinner"></div>';

  try {
    const params = currentFilter ? `?status_filter=${currentFilter}` : '';
    const res = await fetch(`${API_BASE}/feedback${params}`, {
      headers: { 'X-Admin-Token': adminToken }

    renderFeedback(data);
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;

function renderFeedback(items) {
  const list = document.getElementById('feedbackList');
  if (!items.length) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>暂无反馈记录</p></div>`;
    return;
  }

  list.innerHTML = items.map((item, i) => `
    <div class="feedback-card" style="animation-delay:${i * 40}ms">
      <div class="feedback-top">
        <span class="feedback-id">#${item.id}</span>
        <span class="tag tag-${item.feedback_type}">${typeLabel(item.feedback_type)}</span>
        <span class="tag tag-${item.status}">${statusLabel(item.status)}</span>
        <span class="feedback-title" title="${esc(item.page_title)}">${esc(item.page_title) || '—'}</span>
        <span class="feedback-time">${formatTime(item.created_at)}</span>
      </div>
      <div class="feedback-body">${esc(item.content)}</div>
      <div class="feedback-actions">
        ${item.status === 'pending' ? `
          <button class="action-btn btn-resolve" onclick="updateFeedback(${item.id}, 'resolved')">标记已处理</button>
          <button class="action-btn btn-dismiss" onclick="updateFeedback(${item.id}, 'dismissed')">标记已忽略</button>

async function updateFeedback(id, newStatus) {
  try {
    const res = await fetch(`${API_BASE}/feedback/${id}`, {
      method: 'PATCH',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_status: newStatus })
    });
    if (!res.ok) throw new Error(`${res.status}`);
    showToast(statusLabel(newStatus) + '成功', 'success');
    loadFeedback();
  } catch (e) {
    showToast('操作失败：' + e.message, 'error');
  }
}

function filterFeedback(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFeedback();
}

async function saveTabConfig(containerId) {
  const btn = document.getElementById(`save-${containerId}`);
  btn.disabled = true;
  btn.textContent = '保存中...';

  const container = document.getElementById(containerId);
  const updates = {};

  container.querySelectorAll('.config-input[type="text"]').forEach(input => {
    const key = input.dataset.key;
    const isSensitive = input.dataset.sensitive === 'true';
    if (isSensitive && input.value === input.dataset.original) return;
    if (input.value !== input.defaultValue) {
      updates[key] = input.value;
    }
  });

  container.querySelectorAll('.config-input').forEach(el => {
    if (el.tagName === 'SELECT') {
      updates[el.dataset.key] = el.value;
    }
  });

  container.querySelectorAll('.config-item input[type="checkbox"]').forEach(cb => {
    updates[cb.dataset.key] = cb.checked ? 'true' : 'false';
  });

  if (!Object.keys(updates).length) {
    showToast('无变更需要保存', 'info');
    btn.disabled = false;
    btn.textContent = '保存配置';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/config`, {
      method: 'PUT',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const result = await res.json();
    showToast(result.message || '配置已更新，即时生效', 'success');
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '保存配置';
}

async function loadSync() {

  content.innerHTML = '<div class="spinner"></div>';

  try {
    const [statusRes, configRes] = await Promise.all([
      fetch(`${API_BASE}/sync-status`, { headers: { 'X-Admin-Token': adminToken } }),
      fetch(`${API_BASE}/config`, { headers: { 'X-Admin-Token': adminToken } })
    ]);
    if (!statusRes.ok || !configRes.ok) throw new Error('加载失败');
    const status = await statusRes.json();
    const config = await configRes.json();
    renderSync(status, config);
    loadGitHubWorkflow();
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
  }

  // 自动刷新同步状态
  clearInterval(syncPollTimer);
  syncPollTimer = setInterval(pollSyncStatus, 5000);
}

// 状态推导：优先 同步中/构建中 → 手动待同步（manual_trigger，等用户点按钮）→ 10秒内最近结果 → 空闲
function deriveSyncState(status) {
  // 当前进行中的状态
  if (status.syncing && status.building) return { label: '构建中', cls: 'tag-pending' };
  if (status.syncing) return { label: '同步中', cls: 'tag-pending' };

  // 手动待同步：已接收 webhook 但 syncer 不会自动拾取，等待用户点按钮触发
  if (status.manual_trigger && status.pending) return { label: '待同步（手动）', cls: 'tag-suggestion' };

  // 最近完成结果仅展示 10 秒，之后回落空闲；上次状态由独立的 lastSyncStatus 标签永久记录
  const last = status.last_sync_status || '';
  const lastTime = status.last_sync_at;
  if (last && lastTime && !status.pending) {
    const elapsed = Date.now() - new Date(lastTime).getTime();
    if (elapsed < 10000) {
      if (last === 'success') return { label: '同步完成', cls: 'tag-resolved' };
      if (last === 'sync_failed' || last === 'reindex_failed' || last === 'build_failed') return { label: '同步失败', cls: 'tag-error' };
    }
  }

  return { label: '空闲', cls: 'tag-resolved' };
}

// 上次状态原文 → 展示标签
function lastStatusBadge(status) {
  const last = status.last_sync_status || '';
  if (!last) return { label: '—', cls: 'tag-resolved' };
  const map = {
    success: { label: 'success', cls: 'tag-resolved' },
    sync_failed: { label: 'failure', cls: 'tag-error' },
    reindex_failed: { label: 'failure', cls: 'tag-error' },
    build_failed: { label: 'failure', cls: 'tag-error' },
  };
  return map[last] || { label: last, cls: 'tag-other' };
}

async function pollSyncStatus() {
  try {
    const res = await fetch(`${API_BASE}/sync-status`, { headers: { 'X-Admin-Token': adminToken } });
    if (!res.ok) return;
    const status = await res.json();
    const statusEl = document.getElementById('syncStatusBadge');
    const lastEl = document.getElementById('syncLastTime');
    const countEl = document.getElementById('syncEventCount');
    const lastStatusEl = document.getElementById('syncLastStatus');
    if (statusEl) {
      const cur = deriveSyncState(status);
      statusEl.className = `tag ${cur.cls}`;
      statusEl.textContent = cur.label;
    }
    if (lastEl) lastEl.textContent = status.last_sync_at ? formatTime(status.last_sync_at) : '—';
    if (countEl) countEl.textContent = status.event_count || 0;
    if (lastStatusEl) {
      const ls = lastStatusBadge(status);
      lastStatusEl.className = `tag ${ls.cls}`;
      lastStatusEl.textContent = ls.label;
    }
  } catch { /* ignore */ }
}

    <div class="config-section">
      <div class="config-section-title">同步状态</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="config-item">
          <span class="config-label">当前状态</span>
          <span class="tag ${stateCls}" id="syncStatusBadge" style="margin-top:4px;display:inline-block">${stateLabel}</span>
        </div>
        <div class="config-item">
          <span class="config-label">最近同步</span>
          <span id="syncLastTime" style="font-size:.82rem;color:var(--text-secondary);margin-top:4px">${status.last_sync_at ? formatTime(status.last_sync_at) : '—'}</span>
        </div>
        <div class="config-item">
          <span class="config-label">上次状态</span>
          <span id="syncLastStatus" class="tag ${lastStatusDerived.cls}" style="margin-top:4px;display:inline-block">${lastStatusLabel}</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn-save" onclick="triggerSync()" ${status.syncing ? 'disabled' : ''}>
          ${status.syncing ? (status.building ? '构建中...' : '同步中...') : '手动触发同步'}
        </button>
        <span class="save-hint">流程：同步中（远程拉取）→ 构建中（索引+Quartz）→ 完成状态停留10秒 → 空闲；上次状态永久记录在「上次状态」标签</span>
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">远程源</div>
      <div class="config-grid">
        <div class="config-item">
          <label class="config-label">同步方式</label>
          <select class="config-input" data-key="remote_type" style="cursor:pointer;max-width:320px">
            <option value="cos" ${remoteTypVal==='cos'?'selected':''}>COS（腾讯云对象存储）</option>
            <option value="github" ${remoteTypVal==='github'?'selected':''}>GitHub（代码仓库）</option>
          </select>
          <div style="font-size:.72rem;color:var(--text-secondary);margin-top:4px">
            ${remoteTypVal==='github' ? '从 GitHub 仓库拉取笔记（只读）' : '从 COS 存储桶拉取笔记'}
          </div>
        </div>
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">网络代理与加速</div>
      <div class="config-grid">${proxyHtml}</div>
      <div style="font-size:.72rem;color:var(--text-secondary);margin-top:4px">
        仅 GitHub 同步生效；代理需先在宿主机开启 allow-lan，留空则直连
      </div>
    </div>

    <div class="config-section">
      <div class="config-section-title">同步策略</div>
      <div class="config-grid">${configHtml}</div>
    </div>

    <div class="config-section">
      <div class="config-section-title">反馈通知（邮件）</div>
      <div class="config-grid">${notifyHtml}</div>
    </div>

    <div class="config-section">
      <div class="config-section-title">GitHub Actions 自动化</div>
      <div id="githubWorkflowStatus" style="padding:4px 0">
        <div class="spinner" style="width:24px;height:24px;border-width:2px"></div>
      </div>
    </div>

    <div style="margin-top:16px;display:flex;gap:12px;align-items:center">
      <button class="btn-save" id="syncSaveBtn" onclick="saveSyncConfig()">保存同步配置</button>
      <span class="save-hint">保存后即时生效</span>
    </div>
  `;
}

async function saveSyncConfig() {
  const btn = document.getElementById('syncSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  const updates = {};
  // 同步策略三态 → auto_sync_enabled + sync_interval_seconds 翻译
  const modeSel = document.querySelector('#tab-sync [data-sync-mode]');
  const mode = modeSel ? modeSel.value : 'auto';
  if (mode === 'manual') {
    updates['auto_sync_enabled'] = 'false';
    updates['sync_interval_seconds'] = '0';
  } else if (mode === 'auto') {
    updates['auto_sync_enabled'] = 'true';
    updates['sync_interval_seconds'] = '0';
  } else { // scheduled
    updates['auto_sync_enabled'] = 'true';
    // sync_interval_seconds 走下面通用收集（保持用户填的值）
  }
  document.querySelectorAll('#tab-sync [data-key]').forEach(el => {
    if (el.disabled) return; // 非当前模式禁用的字段不提交
    if (el.type === 'checkbox') {
      updates[el.dataset.key] = el.checked ? 'true' : 'false';
      return;
    }
    if (el.dataset.sensitive === 'true') {
      // 敏感字段：空值不覆盖；值等于原始脱敏值不覆盖
      if (!el.value.trim()) return;
      if (el.dataset.original && el.value === el.dataset.original) return;
    }
    updates[el.dataset.key] = el.value;
  });
  try {
    const res = await fetch(`${API_BASE}/config`, {
      method: 'PUT',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!res.ok) throw new Error(`${res.status}`);
    showToast('保存成功，即时生效', 'success');
    loadSync();
    // auto + github 模式：检查 workflow 是否存在，不存在则提示创建
    if (mode === 'auto') {
      const rt = document.querySelector('#tab-sync [data-key="remote_type"]');
      const rtVal = rt ? rt.value : '';
      if (rtVal === 'github') {
        checkAndPromptWorkflow();
      }
    }
  } catch (e) {
    showToast('保存失败：' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '保存同步配置';
  }
}

// 自动同步模式下，若 GitHub workflow 不存在则提示一键创建（不自动写入仓库）
async function checkAndPromptWorkflow() {
  try {
    const res = await fetch(`${API_BASE}/github/workflow`, { headers: { 'X-Admin-Token': adminToken } });
    const data = await res.json();
    if (data.status === 'ok' && !data.exists) {
      showToast('检测到未创建 GitHub Actions 工作流，已为你定位到下方「创建工作流」按钮', 'info');
      document.getElementById('githubWorkflowStatus')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  } catch { /* 忽略，workflow 检查失败不阻塞保存 */ }
}

async function triggerSync() {
  try {
    const res = await fetch(`${API_BASE}/sync-status`, {
      method: 'POST',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pending: true, debounce_until: 0, syncing: false })
    });
    if (!res.ok) throw new Error(`${res.status}`);
    showToast('同步任务已触发，syncer 容器将自动执行', 'success');
    loadSync();
  } catch (e) {
    showToast('触发失败：' + e.message, 'error');
  }
}

// ===== GitHub Actions 自动化 =====
async function loadGitHubWorkflow() {
  const el = document.getElementById('githubWorkflowStatus');
  el.innerHTML = '<div class="spinner" style="width:24px;height:24px;border-width:2px"></div>';
  try {
    const res = await fetch(`${API_BASE}/github/workflow`, {
      headers: { 'X-Admin-Token': adminToken }
    });
    const data = await res.json();
    renderGitHubWorkflow(data);
  } catch (e) {
    el.innerHTML = `<div class="error-msg">加载失败：${esc(e.message)}</div>`;
  }
}

function renderGitHubWorkflow(data) {
  const el = document.getElementById('githubWorkflowStatus');
  if (data.status === 'not_configured') {
    el.innerHTML = `
      <p style="color:var(--text-muted);padding:12px 0">${esc(data.message)}</p>
      <p style="font-size:.78rem;color:var(--text-secondary)">请在「环境配置」中设置 GitHub 仓库信息、Token 和 Webhook 密钥后使用</p>`;
    return;
  }
  if (data.status === 'error') {
    el.innerHTML = `<div class="error-msg">错误：${esc(data.message)}</div>`;
    return;
  }
  const exists = data.exists;
  const statusLabel = exists ? '已配置' : '未创建';
  const statusCls = exists ? 'tag-resolved' : 'tag-other';
  const btnText = exists ? '更新工作流' : '创建工作流';
  const preview = data.expected || '';

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <span class="tag ${statusCls}">${statusLabel}</span>
      <span style="font-size:.82rem;color:var(--text-secondary)">${esc(data.message || (exists ? '仓库中已有博客同步工作流' : '仓库中尚未创建工作流文件'))}</span>
    </div>
    <div style="margin-bottom:12px">
      <div class="config-label" style="margin-bottom:6px">工作流预览（触发路径：${esc(findWorkflowPrefix())}）</div>
      <pre style="background:var(--bg-input);color:var(--text-secondary);padding:12px;border-radius:var(--radius-sm);font-size:.75rem;overflow-x:auto;max-height:300px;overflow-y:auto;font-family:'JetBrains Mono',monospace;line-height:1.5;white-space:pre-wrap">${esc(preview)}</pre>
    </div>
    <button class="btn-save" onclick="upsertGitHubWorkflow()">${btnText}</button>
    <span class="save-hint" style="margin-left:8px">在 GitHub 仓库中创建/更新 .github/workflows/blog-sync.yml</span>`;
}

function findWorkflowPrefix() {
  // 用 notes_github_prefix，回退到「仓库根目录」
  try {
    const items = document.querySelectorAll('#tab-sync [data-key]');
    for (const el of items) { if (el.dataset.key === 'notes_github_prefix' && el.value.trim()) return el.value.trim() + '/**.md'; }
    for (const el of items) { if (el.dataset.key === 'notes_github_prefix' && el.value.trim() === '') return '全部 .md 文件'; }
  } catch {}
  return '根据配置';
}

async function upsertGitHubWorkflow() {
  const btn = document.querySelector('#githubWorkflowStatus .btn-save');
  if (btn) { btn.disabled = true; btn.textContent = '执行中...'; }
  try {
    const res = await fetch(`${API_BASE}/github/workflow`, {
      method: 'POST',
      headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' }
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `${res.status}`);
    }
    showToast('GitHub Actions 工作流已创建/更新', 'success');
    loadGitHubWorkflow();
  } catch (e) {
    showToast('操作失败：' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = '重试'; }
  }
}

// ===== Utils =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } catch { return ts; }
}

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Init =====
(async function init() {
  // 绑定登录事件
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('loginInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  adminToken = getToken();
  if (adminToken) {
    const valid = await verifyToken(adminToken);
    if (valid) {
      document.getElementById('loginOverlay').classList.add('hidden');
      loadFeedback();
      return;
    }
  }
  // Show login
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginInput').focus();
})();
</script>
</body>
